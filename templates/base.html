<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Proximo{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          typography: {
            DEFAULT: {
              css: {
                maxWidth: 'none',
              }
            }
          }
        }
      }
    }
  </script>
  <!-- Minimal prose styles for AI message rendering -->
  <style>
    .prose h1, .prose h2, .prose h3 { font-weight: 600; margin-top: 0.75em; margin-bottom: 0.5em; }
    .prose p { margin-bottom: 0.75em; line-height: 1.6; }
    .prose ul { list-style-type: disc; padding-left: 1.25em; margin-bottom: 0.75em; }
    .prose ol { list-style-type: decimal; padding-left: 1.25em; margin-bottom: 0.75em; }
    .prose li { margin-bottom: 0.25em; }
    .prose code { background: #1e293b; color: #e2e8f0; padding: 0.15em 0.4em; border-radius: 0.25em; font-size: 0.875em; font-family: 'Menlo', 'Monaco', monospace; }
    .prose pre { background: #1e293b; color: #e2e8f0; padding: 1em 1.25em; border-radius: 0.5em; overflow-x: auto; margin-bottom: 0.75em; }
    .prose pre code { background: none; padding: 0; font-size: 0.875em; }
    .prose strong { font-weight: 600; }
    .prose em { font-style: italic; }
    .prose blockquote { border-left: 3px solid #94a3b8; padding-left: 1em; color: #64748b; margin: 0.5em 0; }
    .prose table { border-collapse: collapse; width: 100%; margin-bottom: 0.75em; font-size: 0.875em; }
    .prose thead tr { background: #f1f5f9; }
    .prose th { border: 1px solid #cbd5e1; padding: 0.4em 0.75em; text-align: center; font-weight: 600; color: #334155; }
    .prose td { border: 1px solid #cbd5e1; padding: 0.4em 0.75em; text-align: center; color: #475569; }
  </style>
</head>
<body class="bg-gray-50 min-h-screen font-sans antialiased">
  {% block body %}{% endblock %}
</body>
</html>
